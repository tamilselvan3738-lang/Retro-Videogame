<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAME OVER - 404 Level Not Found</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Press+Start+2P&display=swap"></noscript>
  
  <style>
    /* ==========================================
       1. CSS CUSTOM PROPERTIES (DESIGN SYSTEM)
       ========================================== */
    :root {
      --font-primary: 'Space Grotesk', sans-serif;
      --font-display: 'Chakra Petch', sans-serif;
      --font-retro: 'Press Start 2P', cursive;
      --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-normal: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      
      /* Dark Theme Colors (Default) */
      --color-bg-body: #05050d;
      --color-bg-nav: rgba(10, 10, 26, 0.75);
      --color-border-nav: rgba(255, 0, 127, 0.15);
      --color-text-primary: #f8fafc;
      --color-text-secondary: #94a3b8;
      
      --color-neon-pink: #ff007f;
      --color-neon-cyan: #00f0ff;
      --color-neon-yellow: #ffb700;
      
      --neon-glow-pink: 0 0 8px rgba(255, 0, 127, 0.6), 0 0 20px rgba(255, 0, 127, 0.3);
      --neon-glow-cyan: 0 0 8px rgba(0, 240, 255, 0.6), 0 0 20px rgba(0, 240, 255, 0.3);
      --neon-glow-yellow: 0 0 8px rgba(255, 183, 0, 0.6), 0 0 20px rgba(255, 183, 0, 0.3);
      
      --shadow-nav: 0 10px 30px rgba(0, 0, 0, 0.5);
      --grid-opacity: 0.15;
    }

    /* Light Theme Colors overrides */
    html.light-theme {
      --color-bg-body: #f1f5f9;
      --color-bg-nav: rgba(255, 255, 255, 0.85);
      --color-border-nav: rgba(15, 23, 42, 0.1);
      --color-text-primary: #0f172a;
      --color-text-secondary: #475569;
      
      --color-neon-pink: #d90468;
      --color-neon-cyan: #0099ad;
      --color-neon-yellow: #d97706;
      
      --neon-glow-pink: 0 0 8px rgba(217, 4, 104, 0.4);
      --neon-glow-cyan: 0 0 8px rgba(0, 153, 173, 0.4);
      --neon-glow-yellow: 0 0 8px rgba(217, 119, 6, 0.4);
      
      --shadow-nav: 0 10px 30px rgba(15, 23, 42, 0.05);
      --grid-opacity: 0.04;
    }

    /* ==========================================
       2. RESET & BASE STYLES
       ========================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
      scroll-padding-top: 80px;
    }

    body {
      background-color: var(--color-bg-body);
      color: var(--color-text-primary);
      font-family: var(--font-primary);
      overflow-x: hidden;
      min-height: 100vh;
      transition: background-color var(--transition-normal), color var(--transition-normal);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      background: none;
      border: none;
      font: inherit;
      color: inherit;
      cursor: pointer;
    }

    /* Background Retro Grid */
    .retro-grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .grid-lines {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 200vw;
      height: 300vh;
      transform: translateX(-50%) perspective(500px) rotateX(60deg);
      background-image: 
        linear-gradient(to right, rgba(255, 0, 127, var(--grid-opacity)) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 0, 127, var(--grid-opacity)) 1px, transparent 1px);
      background-size: 50px 50px;
      background-position: center bottom;
      animation: gridScroll 20s linear infinite;
      transform-origin: center bottom;
    }

    .synth-sun {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform: translate(-50%, 20%);
      width: 400px;
      height: 400px;
      background: linear-gradient(to bottom, var(--color-neon-pink), var(--color-neon-yellow));
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      z-index: -1;
      pointer-events: none;
      transition: opacity var(--transition-normal);
    }
    
    html.light-theme .synth-sun {
      opacity: 0.05;
    }

    /* ==========================================
       3. TOP TOOLBAR BAR STYLES
       ========================================== */
    .top-toolbar {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      position: relative;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.15rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--color-text-primary);
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-neon-pink), var(--color-neon-cyan));
      border-radius: 6px;
      box-shadow: var(--neon-glow-pink);
    }

    .logo-icon svg {
      width: 18px;
      height: 18px;
      fill: #ffffff;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-text .primary {
      font-size: 1.1rem;
      background: linear-gradient(to right, var(--color-neon-pink), var(--color-neon-cyan));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .logo-text .secondary {
      font-family: var(--font-retro);
      font-size: 0.45rem;
      color: var(--color-neon-yellow);
      letter-spacing: 0.5px;
      margin-top: 1px;
      animation: neonFlash 2s infinite alternate;
    }

    .toolbar-actions {
      display: flex;
      gap: 0.75rem;
    }

    .icon-toggle-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--color-border-nav);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-secondary);
      background: rgba(255, 255, 255, 0.02);
      transition: all var(--transition-fast);
      position: relative;
      overflow: hidden;
    }

    .icon-toggle-btn:hover {
      color: var(--color-neon-cyan);
      border-color: var(--color-neon-cyan);
      box-shadow: var(--neon-glow-cyan);
      background: rgba(0, 240, 255, 0.05);
      transform: translateY(-2px);
    }

    .icon-toggle-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* Dark Mode Toggle specific */
    .theme-toggle .sun-icon {
      opacity: 0;
      transform: scale(0.5) rotate(90deg);
      position: absolute;
    }
    .theme-toggle .moon-icon {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    html.light-theme .theme-toggle .sun-icon {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }
    html.light-theme .theme-toggle .moon-icon {
      opacity: 0;
      transform: scale(0.5) rotate(-90deg);
      position: absolute;
    }

    html[dir="rtl"] .rtl-toggle-btn svg {
      transform: rotate(180deg);
      color: var(--color-neon-pink);
    }

    /* ==========================================
       4. CRT CHASSIS & SCREEN LAYOUT
       ========================================== */
    .error-container {
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      z-index: 10;
      position: relative;
    }

    .crt-chassis {
      width: 100%;
      max-width: 780px;
      background: #11111b;
      border: 12px solid #27273a;
      border-radius: 24px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), 
                  inset 0 4px 10px rgba(255,255,255,0.05),
                  0 0 40px rgba(0, 240, 255, 0.1);
      padding: 1.5rem;
      position: relative;
      transition: border-color var(--transition-normal);
    }

    html.light-theme .crt-chassis {
      background: #e2e8f0;
      border-color: #cbd5e1;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.1);
    }

    /* Screen with scanlines and glow */
    .crt-screen {
      background: #020208;
      border-radius: 12px;
      border: 4px solid #1a1a2e;
      padding: 3.5rem 2rem;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-shadow: inset 0 0 60px rgba(0,0,0,0.95);
      transition: background-color var(--transition-normal);
    }

    html.light-theme .crt-screen {
      background: #f8fafc;
      border-color: #e2e8f0;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.05);
    }

    /* CRT scanlines effect */
    .crt-screen::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
      background-size: 100% 4px, 6px 100%;
      z-index: 10;
      pointer-events: none;
    }

    /* Screen flicker animation */
    .crt-screen::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: rgba(18, 16, 16, 0.1);
      opacity: 0;
      z-index: 11;
      pointer-events: none;
      animation: crtFlicker 0.15s infinite;
    }

    /* CRT curved shadow glare */
    .crt-glare {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 15%, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
      pointer-events: none;
      z-index: 5;
    }

    /* ==========================================
       5. CONTENT ELEMENTS
       ========================================== */
    .error-tag {
      font-family: var(--font-retro);
      font-size: 0.65rem;
      background: rgba(255, 0, 127, 0.08);
      border: 1px solid var(--color-neon-pink);
      color: var(--color-neon-pink);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      margin-bottom: 2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: var(--neon-glow-pink);
      animation: insertCoinFlash 1.5s infinite alternate;
    }

    .error-title {
      font-family: var(--font-retro);
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: bold;
      color: #fff;
      margin-bottom: 1rem;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.1), 0 0 20px rgba(255, 255, 255, 0.05);
      letter-spacing: -2px;
    }

    html.light-theme .error-title {
      color: #0f172a;
    }

    .error-desc {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      color: var(--color-text-secondary);
      max-width: 500px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    /* Continue block */
    .continue-block {
      font-family: var(--font-retro);
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: var(--color-neon-yellow);
      text-shadow: var(--neon-glow-yellow);
      margin-bottom: 3.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .continue-number {
      font-size: 1.5em;
      display: inline-block;
      margin-left: 0.5rem;
      animation: heartBeat 1s infinite alternate;
    }

    /* Action Buttons Row */
    .action-row {
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      flex-wrap: wrap;
      width: 100%;
      z-index: 15;
    }

    .btn-retro {
      font-family: var(--font-retro);
      font-size: 0.65rem;
      letter-spacing: 1.2px;
      padding: 0.85rem 1.25rem;
      border-radius: 4px;
      text-transform: uppercase;
      transition: all var(--transition-fast);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #000000;
    }

    .btn-pink {
      color: var(--color-neon-pink);
      border: 3px double var(--color-neon-pink);
    }
    
    .btn-pink:hover {
      color: #000000;
      background: var(--color-neon-pink);
      transform: scale(1.05) translateY(-2px);
    }

    .btn-cyan {
      color: var(--color-neon-cyan);
      border: 3px double var(--color-neon-cyan);
    }
    
    .btn-cyan:hover {
      color: #000000;
      background: var(--color-neon-cyan);
      transform: scale(1.05) translateY(-2px);
    }

    .btn-yellow {
      color: var(--color-neon-yellow);
      border: 3px double var(--color-neon-yellow);
    }
    
    .btn-yellow:hover {
      color: #000000;
      background: var(--color-neon-yellow);
      transform: scale(1.05) translateY(-2px);
    }

    .coin-slot-icon {
      width: 8px;
      height: 11px;
      background-color: currentColor;
      border-radius: 2px;
      display: inline-block;
      position: relative;
    }
    .coin-slot-icon::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 3px;
      width: 2px;
      height: 7px;
      background-color: #000000;
    }
    .btn-retro:hover .coin-slot-icon::before {
      background-color: currentColor;
    }

    /* RTL specific mirroring */
    html[dir="rtl"] {
      direction: rtl;
    }

    /* ==========================================
       6. ANIMATIONS
       ========================================== */
    @keyframes neonFlash {
      0%, 100% { opacity: 1; text-shadow: var(--neon-glow-yellow); }
      45%, 55% { opacity: 0.4; text-shadow: none; }
      50% { opacity: 1; text-shadow: var(--neon-glow-yellow); }
    }

    @keyframes insertCoinFlash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    @keyframes gridScroll {
      0% { background-position: center 0px; }
      100% { background-position: center 1000px; }
    }

    @keyframes crtFlicker {
      0% { opacity: 0.15; }
      50% { opacity: 0.18; }
      100% { opacity: 0.15; }
    }

    @keyframes heartBeat {
      0% { transform: scale(1); }
      14% { transform: scale(1.1); }
      28% { transform: scale(1); }
      42% { transform: scale(1.15); }
      70% { transform: scale(1); }
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      .crt-chassis {
        border-width: 8px;
        padding: 0.75rem;
      }
      .crt-screen {
        padding: 2.5rem 1rem;
      }
      .action-row {
        flex-direction: column;
        align-items: stretch;
      }
      .btn-retro {
        justify-content: center;
      }
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
</head>
<body>

  <!-- Retro Glowing Background Grid -->
  <div class="retro-grid-bg">
    <div class="grid-lines"></div>
    <div class="synth-sun"></div>
  </div>

  <!-- TOP TOOLBAR -->
  <div class="top-toolbar" style="justify-content: flex-end;">

    <div class="toolbar-actions">
      <!-- Dark/Light mode toggle -->
      <button class="icon-toggle-btn theme-toggle" id="themeToggleBtn" aria-label="Toggle Dark/Light Mode" title="Toggle Mode">
        <svg class="sun-icon" viewBox="0 0 24 24">
          <path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9h-2v3h2V1.5zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.75l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zm-12.5-1.8l-1.79 1.8 1.41 1.41 1.8-1.79-1.42-1.42zM12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm1 4h-2v3h2v-3zm7.04-6.5h3v-2h-3v2z"/>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24">
          <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.7 3.3-8.8 8.1-9.7.5-.1 1 .3.8.8-.9 2.5-.2 5.3 1.7 7.2 1.9 1.9 4.7 2.6 7.2 1.7.5-.2.9.3.8.8-.9 4.8-5 8.1-9.7 8.1-2.9.1-5.7-1-7.8-3.1-2.1-2.1-3.2-4.9-3.1-7.8-.1 4.7 3.2 8.7 7.9 9.6 1.8.4 3.7.2 5.4-.5.4-.1.8.2.8.6 0 1.2-.6 2.3-1.6 3-1-.6-2-.9-3.2-.9z"/>
        </svg>
      </button>

      <!-- RTL/LTR layout toggle -->
      <button class="icon-toggle-btn rtl-toggle-btn" id="rtlToggleBtn" aria-label="Toggle Layout Direction" title="Toggle Layout Direction">
        <svg viewBox="0 0 24 24">
          <path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ERROR SCREEN CONTAINER -->
  <div class="error-container">
    <div class="crt-chassis">
      <div class="crt-screen">
        <div class="crt-glare"></div>
        
        <span class="error-tag" id="errorMsg">ERROR: 404_DETECTION</span>
        <h1 class="error-title">GAME OVER</h1>
        <p class="error-desc">Level not found! The system could not detect the sector you were looking for. It may have been vaporized or moved to another sector.</p>
        
        <div class="continue-block">
          <span>CONTINUE?</span>
          <span class="continue-number" id="countdownTimer">9</span>
        </div>
        
        <div class="action-row">
          <a href="index.html" class="btn-retro btn-pink" id="btnHome">
            <span class="coin-slot-icon"></span>
            <span>BACK TO HOME</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const htmlEl = document.documentElement;
      
      const themeToggleBtn = document.getElementById('themeToggleBtn');
      const rtlToggleBtn = document.getElementById('rtlToggleBtn');
      const countdownTimer = document.getElementById('countdownTimer');
      const btnHome = document.getElementById('btnHome');
      const errorMsg = document.getElementById('errorMsg');

      // --- Theme Switching ---
      function toggleTheme() {
        const isLight = htmlEl.classList.toggle('light-theme');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
      }

      const savedTheme = localStorage.getItem('theme') || 'dark';
      if (savedTheme === 'light') {
        htmlEl.classList.add('light-theme');
      } else {
        htmlEl.classList.remove('light-theme');
      }

      themeToggleBtn.addEventListener('click', toggleTheme);

      // --- RTL Mirroring ---
      function toggleRTL() {
        const currentDir = htmlEl.getAttribute('dir') || 'ltr';
        const newDir = currentDir === 'ltr' ? 'rtl' : 'ltr';
        htmlEl.setAttribute('dir', newDir);
        localStorage.setItem('dir', newDir);
      }

      const savedDir = localStorage.getItem('dir') || 'ltr';
      htmlEl.setAttribute('dir', savedDir);

      rtlToggleBtn.addEventListener('click', toggleRTL);

      // --- Auto Countdown and Redirect ---
      let timeLeft = 9;
      let countdownActive = true;

      const timerInterval = setInterval(() => {
        if (!countdownActive) return;
        
        timeLeft -= 1;
        countdownTimer.textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          countdownActive = false;
          errorMsg.textContent = "NO_CONTINUE";
          errorMsg.style.borderColor = "var(--color-neon-pink)";
          errorMsg.style.color = "var(--color-neon-pink)";
          
          const continueBlock = document.querySelector('.continue-block');
          if (continueBlock) {
            continueBlock.innerHTML = '<span>GAME OVER</span>';
            continueBlock.style.color = 'var(--color-neon-pink)';
            continueBlock.style.textShadow = 'var(--neon-glow-pink)';
          }
        }
      }, 1000);

      // Cancel countdown if Home Button is clicked to trigger immediate action animation
      btnHome.addEventListener('click', (e) => {
        e.preventDefault();
        clearInterval(timerInterval);
        countdownActive = false;
        
        const textSpan = btnHome.querySelector('span:not(.coin-slot-icon)');
        const originalText = textSpan.textContent;
        
        textSpan.textContent = 'COIN OK!';
        textSpan.style.color = '#00f0ff';
        btnHome.style.borderColor = '#00f0ff';
        btnHome.style.boxShadow = 'none';
        
        setTimeout(() => {
          textSpan.textContent = 'LOADING...';
          setTimeout(() => {
            window.location.href = btnHome.getAttribute('href');
          }, 600);
        }, 500);
      });
    });
  </script>
</body>
</html>
